<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body
    class="bg-gradient-to-br from-[#ECF2FF] via-[#ffffff] to-[#dbeafe] min-h-screen"
  >
    <!-- left side -->
    <div class="flex items-center justify-center min-h-screen px-4 py-10">
      <div
        class="w-full max-w-5xl bg-white/80 backdrop-blur-md rounded-3xl overflow-hidden flex flex-col md:flex-row border border-white/50"
      >
        <div
          class="hidden md:flex md:w-1/2 items-center justify-center bg-white p-6"
        >
          <img
            src="https://img.freepik.com/free-vector/privacy-policy-concept-illustration_114360-7853.jpg?semt=ais_hybrid&w=740"
            alt="Login Illustration"
            class="w-full h-full object-contain max-h-[600px]"
          />

          <!-- right side -->
        </div>
        <div
          class="w-full md:w-1/2 flex flex-col justify-center p-6 sm:p-8 lg:p-10 bg-[#ECF2FF]"
        >
          <h2
            class="text-2xl sm:text-3xl text-center font-bold text-[#1A5276] mb-6"
          >
            Login
          </h2>

          <form action="/index.html" class="space-y-5 flex flex-col items-center">
            <div class="w-full sm:w-11/12">
              <label class="block font-bold text-[#1A5276]"> Email </label>

              <input
                type="email"
                class="w-full p-2 border border-[#1A5276] rounded-lg mt-1 bg-white focus:ring-2 focus:ring-[#149AC5] outline-none"
                placeholder="Enter email"
              />
            </div>

            <div class="relative w-full sm:w-11/12">
              <label class="block font-bold text-[#1A5276]"> Password </label>

              <input
                id="password"
                type="password"
                class="w-full p-2 border border-[#1A5276] rounded-lg mt-1 bg-white focus:ring-2 focus:ring-[#149AC5] outline-none"
                placeholder="Enter password"
              />

              <button
                type="button"
                class="absolute top-9 right-3 text-gray-600"
              >
                <i class="fa-solid fa-eye-slash"></i>
              </button>

              <div class="text-right mt-1">
                <a href="#" class="text-sm text-[#1A5276] hover:underline">
                  Forgot password?
                </a>
              </div>
            </div>

            <button
              type="submit"
              class="w-full sm:w-11/12 bg-[#154360] text-white py-2 rounded-full mt-6 hover:bg-[#149AC5] transition font-semibold"
            >
              Login
            </button>
          </form>

          <div class="mt-5 text-center w-full">
            <p class="text-lg mb-3 text-[#1A5276]">Or login with</p>

            <div class="flex flex-col sm:flex-row justify-center gap-4">
              <!-- Facebook -->
              <button
                class="flex items-center justify-center gap-2 py-1 px-8 border border-[#1A5276] rounded-lg bg-white"
              >
                <img
                  src="/images/facebook_icon.png"
                  alt="Facebook"
                  class="w-10 h-10"
                />
                facebook
              </button>

              <!-- Google -->
              <button
                class="flex items-center justify-center gap-2 py-1 px-11 border border-[#1A5276] rounded-lg bg-white"
              >
                <img
                  src="/images/google_icon.png"
                  alt="Google"
                  class="w-6 h-6"
                />
                Google
              </button>
            </div>
          </div>
          <p class="mt-6 text-center text-lg text-[#1A5276]">
            Don't have an account?
            <a href="/src/pages/auth/register.html" class="hover:underline font-semibold"> Register </a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
